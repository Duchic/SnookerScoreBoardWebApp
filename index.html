<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/simple-grid.css">
    <title>Snooker score board</title>
</head>
<body>
    <div class="container">
        <div class="row language-row">
          <div class="col-12">
            <div class="language-switch" aria-label="Language">
              <input type="button" class="BUTTON_LANG" id="lang-cs" onclick="SetLanguage('cs');" value="CZ" />
              <input type="button" class="BUTTON_LANG" id="lang-en" onclick="SetLanguage('en');" value="EN" />
            </div>
          </div>
        </div>
        <div class="row players-row">
          <div class="col-6">
            <div class="frame-score-container">
              <div class="frame-score" id="p1-frames">0</div>
              <div class="frame-score-label">frames</div>
            </div>
            <input type="text" class="player-name-input" id="p1-name" value="Player 1" />
            <h3 class="center" id="p1points">Points: 0</h3>
            <h3 class="center" id="p1break">Break: 0</h3>
            <input type="button" class="BUTTON_RED" onclick="Red('p1');" name="p1red" id="p1red" value="Red" />
            <input type="button" class="BUTTON_BLACK" onclick="Black('p1');" name="p1black" id="p1black" value="Black" />
            <input type="button" class="BUTTON_PINK" onclick="Pink('p1');" name="p1pink" id="p1pink" value="Pink" />
            <input type="button" class="BUTTON_BLUE" onclick="Blue('p1');" name="p1blue" id="p1blue" value="Blue" />
            <input type="button" class="BUTTON_BROWN" onclick="Brown('p1');" name="p1brown" id="p1brown" value="Brown" />
            <input type="button" class="BUTTON_GREEN" onclick="Green('p1');" name="p1green" id="p1green" value="Green" />
            <input type="button" class="BUTTON_YELLOW" onclick="Yellow('p1');" name="p1yellow" id="p1yellow" value="Yellow" />
            <div class="fouls-row">
              <input type="button" class="BUTTON_FOUL" onclick="Foul7('p1');" name="p1foul7" id="p1foul7" value="Foul7" />
              <input type="button" class="BUTTON_FOUL" onclick="Foul6('p1');" name="p1foul6" id="p1foul6" value="Foul6" />
              <input type="button" class="BUTTON_FOUL" onclick="Foul5('p1');" name="p1foul5" id="p1foul5" value="Foul5" />
              <input type="button" class="BUTTON_FOUL" onclick="Foul4('p1');" name="p1foul4" id="p1foul4" value="Foul4" />
            </div>
            <input type="button" class="BUTTON_WIN_FRAME" onclick="WinFrame('p1');" value="Win Frame" />
          </div>
          <div class="col-6">
            <div class="frame-score-container">
              <div class="frame-score" id="p2-frames">0</div>
              <div class="frame-score-label">frames</div>
            </div>
            <input type="text" class="player-name-input" id="p2-name" value="Player 2" />
            <h3 class="center" id="p2points">Points: 0</h3>
            <h3 class="center" id="p2break">Break: 0</h3>
            <input type="button" class="BUTTON_RED" onclick="Red('p2');" name="p2red" id="p2red" value="Red" />
            <input type="button" class="BUTTON_BLACK" onclick="Black('p2');" name="p2black" id="p2black" value="Black" />
            <input type="button" class="BUTTON_PINK" onclick="Pink('p2');" name="p2pink" id="p2pink" value="Pink" />
            <input type="button" class="BUTTON_BLUE" onclick="Blue('p2');" name="p2blue" id="p2blue" value="Blue" />
            <input type="button" class="BUTTON_BROWN" onclick="Brown('p2');" name="p2brown" id="p2brown" value="Brown" />
            <input type="button" class="BUTTON_GREEN" onclick="Green('p2');" name="p2green" id="p2green" value="Green" />
            <input type="button" class="BUTTON_YELLOW" onclick="Yellow('p2');" name="p2yellow" id="p2yellow" value="Yellow" />
            <div class="fouls-row">
              <input type="button" class="BUTTON_FOUL" onclick="Foul7('p2');" name="p2foul7" id="p2foul7" value="Foul7" />
              <input type="button" class="BUTTON_FOUL" onclick="Foul6('p2');" name="p2foul6" id="p2foul6" value="Foul6" />
              <input type="button" class="BUTTON_FOUL" onclick="Foul5('p2');" name="p2foul5" id="p2foul5" value="Foul5" />
              <input type="button" class="BUTTON_FOUL" onclick="Foul4('p2');" name="p2foul4" id="p2foul4" value="Foul4" />
            </div>
            <input type="button" class="BUTTON_WIN_FRAME" onclick="WinFrame('p2');" value="Win Frame" />
          </div>
        </div>
        <div class="row controls-row">
          <div class="col-6">
            <input type="button" class="BUTTON_SWITCH" onclick="TogglePlayer();" value="Switch Player" />
          </div>
          <div class="col-6">
            <input type="button" class="BUTTON_UNDO" onclick="Undo();" id="btn-undo" value="↩ Undo" disabled />
          </div>
        </div>
        <div class="row stats-row">
          <div class="col-3">
            <h5 class="center" id="ahead_lbl">Tied</h5>
            <h5 class="center" id="ahead">0</h5>
          </div>
          <div class="col-3">
            <h5 class="center" id="remaining_lbl">Remaining</h5>
            <h5 class="center" id="remaining">0</h5>
          </div>
          <div class="col-3">
            <h5 class="center" id="maxPoints_lbl">Your max</h5>
            <h5 class="center" id="maxPoints">0</h5>
          </div>
          <div class="col-3">
            <h5 class="center" id="toWin_lbl">You need</h5>
            <h5 class="center" id="toWin">0</h5>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <div class="progress-section">
              <div class="progress-bar-label" id="bar-player-label">P1</div>
              <div class="progress-bar-container">
                <div class="progress-bar">
                  <div class="progress-current" id="bar-current"></div>
                  <div class="progress-potential" id="bar-potential"></div>
                </div>
                <div class="progress-win-marker" id="bar-win-marker">
                  <div class="marker-label" id="bar-marker-label"></div>
                </div>
                <div class="bar-value-label" id="bar-score-label"></div>
                <div class="bar-value-label" id="bar-max-label"></div>
              </div>
            </div>
            <div class="progress-legend">
              <span class="legend-item"><span class="legend-dot" id="legend-current-dot"></span> <span id="legend-current-label">Player score</span></span>
              <span class="legend-item"><span class="legend-dot" id="legend-potential-dot"></span> <span id="legend-potential-label">Max reachable</span></span>
              <span class="legend-item"><span class="legend-marker-icon"></span> <span id="legend-marker-label">Opponent needs snooker</span></span>
            </div>
          </div>
        </div>
        <div class="row bottom-row">
          <div class="col-6">
            <input type="button" class="BUTTON_RESET" onclick="Reset();" value="Next Frame" />
          </div>
          <div class="col-6">
            <input type="button" class="BUTTON_NEW_MATCH" onclick="ResetMatch();" value="New Match" />
          </div>
        </div>
      </div>
      <script src="js/i18n.js" type="text/javascript"></script>
      <script src="js/script.js" type="text/javascript"></script>
</body>
</html>
